<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <style>
    /* Minimalist CSS */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: normal;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background-color: #007BFF;
      color: white;
      font-weight: 500;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin: 10px 5px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
    }

    .btn:hover {
      background: #0056b3;
    }

    .button-container {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      th, td {
        padding: 8px 10px;
        font-size: 0.9em;
      }

      .btn {
        width: 90%;
        margin: 10px auto;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Admin Dashboard</h1>

    <div class="button-container">
      <button class="btn" id="refreshBtn">Refresh Data</button>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="dataTable">
        <!-- Data will be inserted here -->
      </tbody>
    </table>
  </div>

  <script>
    // ===== Protect Dashboard =====
    if (!sessionStorage.getItem('adminLoggedIn') || sessionStorage.getItem('adminLoggedIn') !== 'true') {
      alert("You must log in as admin to access this page.");
      window.location.href = 'login.html'; // redirect if not logged in
    }

    const dataTable = document.getElementById('dataTable');
    const refreshBtn = document.getElementById('refreshBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // Fetch form submission data
    async function fetchData() {
      try {
        const res = await fetch('http://localhost:5000/api/users'); // your API endpoint
        const data = await res.json();

        dataTable.innerHTML = '';

        data.forEach((item, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${item.name}</td>
            <td>${item.email}</td>
            <td>${item.message}</td>
          `;
          dataTable.appendChild(tr);
        });
      } catch (error) {
        console.error('Error fetching data:', error);
        dataTable.innerHTML = '<tr><td colspan="4">Error fetching data</td></tr>';
      }
    }

    // Load data on page load
    fetchData();

    // Refresh button
    refreshBtn.addEventListener('click', fetchData);

    // Logout button
    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('adminLoggedIn');
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
